name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bmv
          POSTGRES_PASSWORD: bmv
          POSTGRES_DB: browsemyvacations
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bmv -d browsemyvacations"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bmv:bmv@localhost:5432/browsemyvacations?schema=public
      DIRECT_URL: postgresql://bmv:bmv@localhost:5432/browsemyvacations?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build database package
        run: pnpm --filter @bmv/database build

      - name: Build backend
        run: pnpm --filter backend build

      - name: Build shared package
        run: pnpm --filter @bmv/shared build

      - name: Push schema and seed
        run: pnpm db:push && pnpm db:seed

      - name: Unit tests
        run: pnpm test:unit

      - name: E2E tests
        run: pnpm test:e2e
        env:
          JWT_SECRET: ci-test-secret-min-16-chars
          CORS_ORIGIN: http://localhost:3100
          REDIS_URL: redis://localhost:6379

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3100
          NEXT_PUBLIC_API_URL: http://localhost:3101/api/v1
